spring.application.name=mail-system
spring.jpa.open-in-view=false

# H2 Database Configuration (file-based for data persistence across restarts)
spring.datasource.url=jdbc:h2:file:./data/mailsystem;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# JWT Configuration
jwt.secret=your-very-secure-and-long-secret-key-that-must-be-at-least-256-bits
jwt.expiration-ms=86400000

# Logging for debugging
logging.level.de.thm.mni.mailsystem=DEBUG
logging.level.org.springframework.security=DEBUG
