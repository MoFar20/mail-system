<div class="compose-view">
  <!-- Compose Header -->
  <div class="compose-header">
    <span class="compose-title">{{ isEditMode ? 'Entwurf bearbeiten' : 'Neue Nachricht' }}</span>
    <div class="compose-actions">
      <button class="icon-btn" title="Minimieren">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path fill="currentColor" d="M6 19h12v2H6z"/>
        </svg>
      </button>
      <button class="icon-btn" title="Vollbild">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path fill="currentColor" d="M15 3l2.3 2.3-2.89 2.87 1.42 1.42L18.7 6.7 21 9V3h-6zM3 9l2.3-2.3 2.87 2.89 1.42-1.42L6.7 5.3 9 3H3v6zm6 12l-2.3-2.3 2.89-2.87-1.42-1.42L5.3 17.3 3 15v6h6zm12-6l-2.3 2.3-2.87-2.89-1.42 1.42 2.89 2.87L15 21h6v-6z"/>
        </svg>
      </button>
      <button class="icon-btn" title="Schließen" (click)="onCancel()">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Error/Success Messages -->
  <div *ngIf="errorMessage" class="message-banner error">
    <svg viewBox="0 0 24 24" width="20" height="20">
      <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
    </svg>
    <span>{{ errorMessage }}</span>
  </div>
  <div *ngIf="successMessage" class="message-banner success">
    <svg viewBox="0 0 24 24" width="20" height="20">
      <path fill="currentColor" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
    </svg>
    <span>{{ successMessage }}</span>
  </div>

  <form [formGroup]="mailForm">
    <!-- Recipients Section -->
    <div class="recipient-section" formArrayName="to">
      <label class="field-label">An</label>
      <div class="recipients-container">
        <div class="recipient-chips">
          <div class="recipient-chip" *ngFor="let control of toEmails.controls; let i = index">
            <input [formControlName]="i"
                   type="email"
                   placeholder="Empfänger"
                   class="chip-input"
                   [class.invalid]="control.invalid && control.touched">
            <button type="button" class="chip-remove" (click)="removeRecipient('to', i)" *ngIf="toEmails.length > 1">
              <svg viewBox="0 0 24 24" width="18" height="18">
                <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="button" class="add-recipient-btn" (click)="addRecipient('to')">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
          </svg>
        </button>
      </div>
      <div class="field-toggles">
        <button type="button" class="toggle-btn" (click)="showCc = !showCc" [class.active]="showCc">Cc</button>
        <button type="button" class="toggle-btn" (click)="showBcc = !showBcc" [class.active]="showBcc">Bcc</button>
      </div>
    </div>

    <!-- CC Recipients -->
    <div class="recipient-section" *ngIf="showCc" formArrayName="cc">
      <label class="field-label">Cc</label>
      <div class="recipients-container">
        <div class="recipient-chips">
          <div class="recipient-chip" *ngFor="let control of ccEmails.controls; let i = index">
            <input [formControlName]="i"
                   type="email"
                   placeholder="Kopie an"
                   class="chip-input"
                   [class.invalid]="control.invalid && control.touched">
            <button type="button" class="chip-remove" (click)="removeRecipient('cc', i)">
              <svg viewBox="0 0 24 24" width="18" height="18">
                <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="button" class="add-recipient-btn" (click)="addRecipient('cc')">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- BCC Recipients -->
    <div class="recipient-section" *ngIf="showBcc" formArrayName="bcc">
      <label class="field-label">Bcc</label>
      <div class="recipients-container">
        <div class="recipient-chips">
          <div class="recipient-chip" *ngFor="let control of bccEmails.controls; let i = index">
            <input [formControlName]="i"
                   type="email"
                   placeholder="Blindkopie an"
                   class="chip-input"
                   [class.invalid]="control.invalid && control.touched">
            <button type="button" class="chip-remove" (click)="removeRecipient('bcc', i)">
              <svg viewBox="0 0 24 24" width="18" height="18">
                <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="button" class="add-recipient-btn" (click)="addRecipient('bcc')">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Subject -->
    <div class="subject-section">
      <input type="text"
             formControlName="subject"
             placeholder="Betreff"
             class="subject-input"
             maxlength="255"
             [class.invalid]="mailForm.get('subject')?.invalid && mailForm.get('subject')?.touched">
    </div>

    <!-- Content -->
    <div class="content-section">
      <textarea formControlName="content"
                placeholder="Nachricht verfassen"
                class="content-textarea"
                [class.invalid]="mailForm.get('content')?.invalid && mailForm.get('content')?.touched"></textarea>
    </div>

    <!-- Hidden file input for attachments -->
    <input type="file"
           #fileInput
           (change)="onFilesSelected($event)"
           multiple
           accept=".pdf,.doc,.docx,.xls,.xlsx,.png,.jpg,.jpeg,.gif,.webp,.txt"
           style="display: none;">

    <!-- Attachments Section -->
    <div class="attachments-section" *ngIf="existingAttachments.length > 0 || pendingFiles.length > 0">
      <div class="attachments-header">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path fill="currentColor" d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
        </svg>
        <span>{{ totalAttachmentCount }} Anhang{{ totalAttachmentCount > 1 ? 'e' : '' }}</span>
      </div>
      <div class="attachment-chips">
        <!-- Existing attachments (already uploaded) -->
        <div *ngFor="let att of existingAttachments; let i = index" class="attachment-chip existing">
          <svg viewBox="0 0 24 24" width="18" height="18" class="attachment-file-icon">
            <path fill="currentColor" d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
          </svg>
          <div class="attachment-chip-info">
            <span class="attachment-chip-name">{{ att.fileName }}</span>
            <span class="attachment-chip-size">{{ formatFileSize(att.size) }}</span>
          </div>
          <button type="button" class="attachment-chip-remove" (click)="removeExistingAttachment(att, i)" title="Anhang entfernen">
            <svg viewBox="0 0 24 24" width="16" height="16">
              <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
          </button>
        </div>
        <!-- Pending files (not yet uploaded) -->
        <div *ngFor="let file of pendingFiles; let i = index" class="attachment-chip pending">
          <svg viewBox="0 0 24 24" width="18" height="18" class="attachment-file-icon">
            <path fill="currentColor" d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
          </svg>
          <div class="attachment-chip-info">
            <span class="attachment-chip-name">{{ file.name }}</span>
            <span class="attachment-chip-size">{{ formatFileSize(file.size) }} • Neu</span>
          </div>
          <button type="button" class="attachment-chip-remove" (click)="removePendingFile(i)" title="Anhang entfernen">
            <svg viewBox="0 0 24 24" width="16" height="16">
              <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Bottom Toolbar -->
    <div class="compose-toolbar">
      <div class="toolbar-left">
        <button type="button" class="send-btn" (click)="onSaveAndSend()" [disabled]="isLoading || isUploadingAttachments">
          <span *ngIf="!isLoading && !isUploadingAttachments">Senden</span>
          <span *ngIf="isUploadingAttachments" class="loading-spinner"></span>
          <span *ngIf="isLoading && !isUploadingAttachments" class="loading-spinner"></span>
        </button>

        <div class="formatting-tools">
          <button type="button" class="tool-btn" title="Formatierungsoptionen">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path fill="currentColor" d="M5 17v2h14v-2H5zm4.5-4.2h5l.9 2.2h2.1L12.75 4h-1.5L6.5 15h2.1l.9-2.2zM12 5.98L13.87 11h-3.74L12 5.98z"/>
            </svg>
          </button>
          <button type="button" class="tool-btn" title="Anhang hinzufügen" (click)="openFileDialog()">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path fill="currentColor" d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
            </svg>
          </button>
          <button type="button" class="tool-btn" title="Link einfügen">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path fill="currentColor" d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/>
            </svg>
          </button>
          <button type="button" class="tool-btn" title="Emoji einfügen">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path fill="currentColor" d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="toolbar-right">
        <button type="button" class="save-draft-btn" (click)="onSave()" [disabled]="isLoading || isUploadingAttachments" title="Als Entwurf speichern">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M21.99 8c0-.72-.37-1.35-.94-1.7L12 1 2.95 6.3C2.38 6.65 2 7.28 2 8v10c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2l-.01-10zm-10 7L4 10.47V8.53l7.99 4.54L20 8.53v1.94L11.99 15z"/>
          </svg>
        </button>
        <button type="button" class="delete-btn" (click)="onCancel()" title="Verwerfen">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
          </svg>
        </button>
      </div>
    </div>
  </form>
</div>
